apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://otwld.github.io/ollama-helm/
      targetRevision: ollama-1.57.0
      chart: ollama
      helm:
        valueFiles:
          - $myoverridevalues/manifests/ollama-values.yaml
    - repoURL: https://github.com/charlieboom/ai-cluster/
      targetRevision: HEAD
      ref: myoverridevalues
  destination:
    server: https://kubernetes.default.svc
    namespace: ollama
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true